<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPC System Architecture</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0b10;
  --bg2:#0e1018;
  --ring-inner:#1a1c2e;
  --ring-mid:#12141f;
  --ring-outer:#0d0f18;
  --accent-director:#ff6b4a;
  --accent-world:#4ae8ff;
  --accent-day:#ffd44a;
  --accent-llm:#c084fc;
  --accent-tts:#34d399;
  --accent-tilemap:#f97316;
  --accent-npc:#ff4a8d;
  --accent-prompt:#a78bfa;
  --text:#e2e4ef;
  --text-dim:#6b6f8a;
  --text-mid:#9498b5;
  --glow-director:rgba(255,107,74,.15);
  --glow-world:rgba(74,232,255,.15);
  --glow-day:rgba(255,212,74,.15);
}

html,body{
  height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:'Outfit',sans-serif;
}

.app{
  position:relative;z-index:1;width:100%;height:100%;
  display:flex;flex-direction:column;
}

header{
  padding:20px 32px 0;display:flex;align-items:baseline;gap:16px;flex-shrink:0;
}
header h1{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;
  letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);
}
header .dot{
  width:6px;height:6px;border-radius:50%;background:var(--accent-npc);
  animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

.diagram-area{
  flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

svg.rings{
  width:min(90vw,90vh);height:min(90vw,90vh);
}

/* Detail panel */
.detail-panel{
  position:fixed;right:-420px;top:0;bottom:0;width:400px;
  background:rgba(10,11,16,.96);border-left:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(20px);z-index:100;
  transition:right .4s cubic-bezier(.16,1,.3,1);
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.detail-panel.open{right:0}
.detail-panel .close-btn{
  position:absolute;top:16px;right:16px;width:32px;height:32px;
  border:1px solid rgba(255,255,255,.1);border-radius:8px;
  background:transparent;color:var(--text-dim);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.detail-panel .close-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.detail-header{
  padding:40px 28px 20px;border-bottom:1px solid rgba(255,255,255,.05);
}
.detail-header .tag{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:8px;
}
.detail-header h2{
  font-size:22px;font-weight:700;line-height:1.3;
}
.detail-body{
  padding:24px 28px;flex:1;
}
.detail-body p{
  font-size:13px;line-height:1.8;color:var(--text-mid);margin-bottom:16px;
}
.detail-body .detail-list{
  list-style:none;padding:0;
}
.detail-body .detail-list li{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:8px 12px;border-left:2px solid var(--text-dim);
  margin-bottom:6px;color:var(--text-mid);line-height:1.5;
  background:rgba(255,255,255,.02);border-radius:0 6px 6px 0;
  transition:all .15s;
}
.detail-body .detail-list li:hover{
  background:rgba(255,255,255,.04);color:var(--text);
}
.detail-body h3{
  font-size:11px;font-family:'JetBrains Mono',monospace;
  letter-spacing:1px;text-transform:uppercase;
  color:var(--text-dim);margin:20px 0 10px;
}

/* Connections panel (left) */
.connections-panel{
  position:fixed;left:-420px;top:0;bottom:0;width:400px;
  background:rgba(10,11,16,.96);border-right:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(20px);z-index:100;
  transition:left .4s cubic-bezier(.16,1,.3,1);
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.connections-panel.open{left:0}
.connections-panel .close-btn{
  position:absolute;top:16px;left:16px;width:32px;height:32px;
  border:1px solid rgba(255,255,255,.1);border-radius:8px;
  background:transparent;color:var(--text-dim);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.connections-panel .close-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

.conn-header{
  padding:40px 28px 16px;border-bottom:1px solid rgba(255,255,255,.05);
}
.conn-header .tag{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:8px;
}
.conn-header h2{
  font-size:20px;font-weight:700;line-height:1.3;
}

.conn-body{
  padding:16px 28px;flex:1;
}
.conn-section-title{
  font-size:10px;font-family:'JetBrains Mono',monospace;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-dim);margin:16px 0 8px;
  display:flex;align-items:center;gap:8px;
}
.conn-section-title .conn-arrow{
  font-size:12px;
}
.conn-item{
  margin-bottom:12px;padding:10px 14px;
  background:rgba(255,255,255,.02);border-radius:8px;
  border-left:2px solid var(--text-dim);
  transition:all .15s;cursor:default;
}
.conn-item:hover{
  background:rgba(255,255,255,.04);
}
.conn-item-header{
  display:flex;align-items:center;gap:8px;margin-bottom:4px;
}
.conn-item-node{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  font-weight:600;
}
.conn-item-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--text-dim);
}
.conn-item-desc{
  font-size:12px;line-height:1.6;color:var(--text-mid);
  margin-top:6px;
}

/* Tooltip */
.tooltip{
  position:fixed;pointer-events:none;z-index:200;
  background:rgba(14,16,24,.95);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;padding:8px 14px;backdrop-filter:blur(12px);
  font-size:12px;color:var(--text);white-space:nowrap;
  opacity:0;transition:opacity .15s;
  font-family:'JetBrains Mono',monospace;
}
.tooltip.visible{opacity:1}

/* Legend */
.legend{
  position:fixed;bottom:20px;left:24px;z-index:50;
  display:flex;gap:20px;
}
.legend-item{
  display:flex;align-items:center;gap:6px;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.5px;color:var(--text-dim);
}
.legend-swatch{
  width:10px;height:10px;border-radius:3px;
}

.hint{
  position:fixed;bottom:20px;right:24px;z-index:50;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--text-dim);letter-spacing:.5px;
  animation:fade-hint 3s ease-in-out infinite alternate;
}
@keyframes fade-hint{0%{opacity:.3}100%{opacity:.7}}

.back-btn{
  position:fixed;top:16px;right:16px;z-index:200;
  width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  color:var(--text-dim);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;cursor:pointer;
  transition:all .2s;
}
.back-btn:hover{
  border-color:rgba(74,232,255,.5);color:rgba(74,232,255,.9);
  background:rgba(74,232,255,.08);
}
</style>
</head>
<body>
<a href="/" class="back-btn" title="Back">&larr;</a>

<div class="app">
  <header>
    <h1>NPC System Architecture</h1>
    <div class="dot"></div>
  </header>
  <div class="diagram-area">
    <svg class="rings" id="diagram" viewBox="-500 -500 1000 1000"></svg>
  </div>
</div>

<div class="connections-panel" id="connections-panel">
  <button class="close-btn" onclick="closeConnectionsPanel()">&times;</button>
  <div class="conn-header" id="conn-header"></div>
  <div class="conn-body" id="conn-body"></div>
</div>

<div class="detail-panel" id="detail-panel">
  <button class="close-btn" onclick="closePanel()">&times;</button>
  <div class="detail-header" id="detail-header"></div>
  <div class="detail-body" id="detail-body"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-director)"></div>Director</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-world)"></div>World</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-day)"></div>Day Cycle</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-npc)"></div>NPC State</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-llm)"></div>LLM</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-tts)"></div>TTS</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-tilemap)"></div>Tilemap</div>
</div>

<div class="hint">click any element to explore</div>

<script>
// ─── SVG helpers ───────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('diagram');
let globalTime = 0;

function el(tag, attrs={}){
  const e = document.createElementNS(SVG_NS, tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}

function polarToXY(cx, cy, r, angleDeg){
  const rad = (angleDeg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function arcPath(cx, cy, r, startAngle, endAngle){
  const s = polarToXY(cx, cy, r, startAngle);
  const e = polarToXY(cx, cy, r, endAngle);
  const large = endAngle - startAngle > 180 ? 1 : 0;
  return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 1 ${e.x} ${e.y}`;
}

// ─── Defs (gradients, filters, markers) ────────
const defs = el('defs');
svg.appendChild(defs);

// Glow filter
function makeGlow(id, color, stdDev=4){
  const f = el('filter',{id, x:'-50%', y:'-50%', width:'200%', height:'200%'});
  const gb = el('feGaussianBlur',{in:'SourceGraphic',stdDeviation:String(stdDev),result:'blur'});
  const merge = el('feMerge');
  const mn1 = el('feMergeNode',{in:'blur'});
  const mn2 = el('feMergeNode',{in:'SourceGraphic'});
  merge.appendChild(mn1); merge.appendChild(mn2);
  f.appendChild(gb); f.appendChild(merge);
  defs.appendChild(f);
}
makeGlow('glow-director','#ff6b4a',6);
makeGlow('glow-world','#4ae8ff',6);
makeGlow('glow-day','#ffd44a',6);
makeGlow('glow-npc','#ff4a8d',6);
makeGlow('glow-llm','#c084fc',6);
makeGlow('glow-tts','#34d399',6);
makeGlow('glow-tilemap','#f97316',6);
makeGlow('glow-prompt','#a78bfa',5);
makeGlow('glow-soft','#fff',2);

// ─── Layer groups ──────────────────────────────
const layerBg = el('g',{id:'layer-bg'});
const layerRings = el('g',{id:'layer-rings'});
const layerConnections = el('g',{id:'layer-connections'});
const layerNodes = el('g',{id:'layer-nodes'});
const layerLabels = el('g',{id:'layer-labels'});
const layerParticles = el('g',{id:'layer-particles'});
svg.append(layerBg, layerRings, layerConnections, layerNodes, layerLabels, layerParticles);

// ─── Ring backgrounds ──────────────────────────
// Outer ring zone
const outerRingBg = el('circle',{cx:0,cy:0,r:440,fill:'none',stroke:'rgba(255,255,255,.018)',
  'stroke-width':120});
layerBg.appendChild(outerRingBg);

// Middle ring zone
const midRingBg = el('circle',{cx:0,cy:0,r:290,fill:'none',stroke:'rgba(255,255,255,.025)',
  'stroke-width':100});
layerBg.appendChild(midRingBg);

// Inner ring zone
const innerRingBg = el('circle',{cx:0,cy:0,r:140,fill:'rgba(255,74,141,.02)',stroke:'rgba(255,74,141,.06)',
  'stroke-width':1});
layerBg.appendChild(innerRingBg);

// Decorative concentric dashes
[190, 340, 440].forEach((r,i)=>{
  const c = el('circle',{cx:0,cy:0,r,fill:'none',
    stroke:'rgba(255,255,255,.04)','stroke-width':.5,
    'stroke-dasharray':'3 8'});
  layerBg.appendChild(c);
});

// ─── DATA ──────────────────────────────────────
const INNER_NODES = [
  {id:'emotions', label:'Emotions', icon:'', angle:0,
    detail:{
      tag:'NPC STATE', title:'7-Dimensional Emotions',
      desc:'Every NPC has 7 continuous emotion axes (0-1) that shift in real-time during conversations, activities, and interactions. Emotions decay toward per-NPC baselines (15% pull per cycle, falls back to global defaults).',
      items:['anger (default baseline .3)','trust (default baseline .3)','fear (default baseline .3)','joy (default baseline .3)','sadness (default baseline .15)','curiosity (default baseline .4)','guilt (default baseline .1)']
    }},
  {id:'moods', label:'Moods', icon:'', angle:40,
    detail:{
      tag:'NPC STATE', title:'Persistent Moods',
      desc:'Derived from emotional state via threshold checks. When an NPC sustains strong emotions, they enter a named mood that colors their speech, patience, and reactions. Moods persist until emotions shift below thresholds. Only included in prompts after 1+ minute of persistence.',
      sections:[
        {title:'Mood Derivation (priority order)',items:['paranoid: fear > 0.5 AND trust < 0.3','bitter: anger > 0.5 AND trust < 0.3','melancholy: sadness > 0.5','guilt-ridden: guilt > 0.5','volatile: anger > 0.6','restless: curiosity > 0.6 AND joy < 0.3','euphoric: joy > 0.7','clears to undefined if no threshold met']},
        {title:'Storage',items:['mood: string | undefined','moodSince: timestamp (Date.now())','recomputed after every conversation (Director post-playback)','prompt builder checks moodSince > 60s before including']}
      ]
    }},
  {id:'relationships', label:'Relationships', icon:'', angle:80,
    detail:{
      tag:'NPC STATE', title:'Per-Pair Relationships',
      desc:'Every NPC pair tracks an 8-axis relationship that evolves through conversations and interactions. Regard is the core axis ranging from -1 (enemy) to +1 (beloved). Velocity tracking detects warming/cooling trends.',
      items:['regard: -1 to 1 (stranger \u2192 enemy / beloved)','affection, respect, trust, fear, disgust: 0-1','debt: -1 to 1 (positive = I owe them)','familiarity: 0-1 (increments per conversation)','initial values: respect 0.3, trust 0.3, all others 0','velocity tracking (last 10 snapshots)','trajectory labels: warming / deteriorating / stable']
    }},
  {id:'memory', label:'Memory', icon:'', angle:120,
    detail:{
      tag:'NPC STATE', title:'Dual Memory System',
      desc:'Short-term memory holds recent events (40 entries). When evicted, high-importance memories promote to long-term storage (100 entries). Recency decays at 0.85x per conversation cycle, creating natural forgetting.',
      items:['short-term: 40 entries, evict lowest recency\u00d7importance','long-term: 100 entries, promote at importance \u2265 0.7','14 memory types (conversation, gossip, secret_learned, promise_made, eavesdrop, etc.)','retrieval: sorted by recency\u00d7importance, filtered by involvement','unresolved flag for unfinished business (promises, betrayals)','sentiment tracking per memory (-1 to 1)']
    }},
  {id:'secrets', label:'Secrets', icon:'', angle:160,
    detail:{
      tag:'NPC STATE', title:'Secrets & Known Secrets',
      desc:'Each NPC holds private secrets and tracks what they\'ve learned about others. Secrets drive dramatic tension\u2014the Director scores information asymmetry heavily when choosing conversation pairs.',
      items:['own secrets[] (private, revealable at trust \u2265 0.7)','knownSecrets map: NPC id \u2192 discovered secrets','secret_revealed in conversation triggers memory + gossip','information asymmetry = major Director scoring factor']
    }},
  {id:'promises', label:'Promises', icon:'', angle:200,
    detail:{
      tag:'NPC STATE', title:'Promises & Betrayals',
      desc:'NPCs make promises during conversations that resolve 1-2 day phases later. The LLM decides if each promise is kept or broken based on personalities and circumstances. Broken promises create betrayal records that fuel confrontations.',
      items:['promise: text, fromId, toId, resolveAtPhase','betrayal: betrayerId, victimId, discoveredByVictim, forgiven','broken promises auto-resolve after 6+ phases','kept: +regard, +trust, +joy, -anger, -guilt','broken: -regard, -trust, -joy, +anger, +sadness, +guilt','forgiveness possible during reconciliation conversations']
    }},
  {id:'inventory', label:'Inventory', icon:'', angle:240,
    detail:{
      tag:'NPC STATE', title:'Items & Inventory',
      desc:'NPCs carry up to 8 items acquired through activities (fishing, foraging, cooking, etc.). Items decay by category and can be gifted or referenced in conversations. Item-based interactions get priority scoring.',
      items:['max 8 items per NPC','6 categories: food, herb, fish, trinket, craft, book','decay timers: fish 2m, food 3m, herb 5m, craft 8m, trinket 10m, book 12m','items referenced in prompt builder for natural speech','gift-giving: relationship boost + memory creation']
    }},
  {id:'goals', label:'Goals & Arcs', icon:'', angle:280,
    detail:{
      tag:'NPC STATE', title:'Goals & Character Arcs',
      desc:'Each NPC has a current goal (influences waypoint selection and conversation topics) and a growing character arc narrative updated after reflective moments. Behavioral overrides and reactive impulses provide short-term urgency.',
      items:['currentGoal: string (influences waypoint picks + prompts)','characterArc: narrative of growth, appended post-conversation','behavioralOverride: seek/avoid specific NPC (time-limited)','reactiveImpulse: high-urgency follow-up desire (0-1 urgency)']
    }},
  {id:'identity', label:'Identity', icon:'', angle:320,
    detail:{
      tag:'NPC STATE', title:'Core Identity',
      desc:'The foundation of each NPC: name, visual appearance, personality traits, core desires, and backstory. Backstory is preferred over trait lists in prompts for more natural characterization. Personality traits also influence waypoint selection and activity affinity.',
      items:['name, avatar, color, spriteId','personalityTraits[] (e.g. stoic, gentle, curious)','coreDesires[] (e.g. seek truth, protect the weak)','backstory (narrative paragraph, preferred in prompts)','customVoiceId (for TTS voice cloning)','traits affect world behavior: curious \u2192 exploration, anxious \u2192 edges, charming \u2192 crowds']
    }},
];

const MID_NODES = [
  {id:'director', label:'Director Loop', color:'var(--accent-director)', glow:'glow-director',
    angle:30, span:100, radius:290,
    detail:{
      tag:'LOOP \u00b7 ~5s', title:'Director Pipeline',
      desc:'The Director is the narrative brain\u2014a background loop that pre-generates entire conversations before NPCs even meet. It scores every possible NPC pair by dramatic potential, picks the most interesting match, and orchestrates generation \u2192 TTS \u2192 playback.',
      sections:[
        {title:'Pair Scoring',items:['reactive impulses: urgency \u00d7 8 (highest priority)','relationship velocity (warming/cooling): +3','pending promises: +2 each','time since last talk: up to +5 (for 5+ min gap)','emotional intensity (anger/joy/fear/sadness peaks): sum \u00d7 2','relationship extremes (|regard|): \u00d7 2','information asymmetry (secrets known about other): +3','unrevealed secrets: +1.5','goal involves partner: +4','love triangles/jealousy: triangulation score','undiscovered betrayals: +4','active grudges: +5 (if >3 min old), else +3','broken promises: +2.5','isolation (no recent contact): up to +3 per NPC','random jitter: +0 to +1.5']},
        {title:'Pipeline Stages',items:['1. Scene direction (LLM): suggest type + creative hints','2. Generate full conversation (single LLM call, 4\u201310 turns)','3. TTS prefetch (serialized for GPU, per-turn)','4. Queue for playback (ready at 2+ buffered turns)','5. Trigger on proximity (\u22645 tiles apart)','pipeline depth capped at 3, prepared conversations expire after 10 min']},
        {title:'Conversation Types (with relationship-change caps)',items:['casual: natural, proportional (cap \u00b10.30)','confrontation: direct, raw, cutting (cap \u00b10.50)','reconciliation: vulnerable, olive branches (cap \u00b10.40)','confession: build toward honesty (cap \u00b10.45)','alliance_forming: warm, conspiratorial (cap \u00b10.40)','gossip_session: trade information (cap \u00b10.30)']},
        {title:'Post-Conversation Write-Back',items:['applies emotion deltas + relationship deltas to both NPCs','creates conversation summary memory for both','increments familiarity between the pair','updates character arcs','records relationship snapshot (for velocity tracking)','triggers reactive impulses from dramatic events','emotional contagion: nearby NPCs (\u22645 tiles) absorb fear/joy','computes and sets persistent mood from new emotional state']}
      ]
    }},
  {id:'world', label:'World Loop', color:'var(--accent-world)', glow:'glow-world',
    angle:160, span:100, radius:290,
    detail:{
      tag:'LOOP \u00b7 ~285ms', title:'World Simulation',
      desc:'The spatial heartbeat of the system. Every tick, NPCs pathfind to chosen waypoints, perform activities, interact with nearby NPCs, eavesdrop on conversations, and act on internal drives. All of these write back to NPC state.',
      sections:[
        {title:'Movement',items:['A* pathfinding with collision grid','waypoint selection: personality + emotions + time-of-day + relationships','trait bonuses: curious \u2192 exploration, anxious \u2192 edges, charming \u2192 crowds','recency penalty on just-visited waypoints','stuck detection: recompute after 8 blocked ticks','behavioral overrides (seek/avoid) from Director']},
        {title:'Activities (14 types)',items:['reading, gardening, fishing, meditating, cooking, sketching, shopping, people_watching, wishing, stargazing, foraging, training, writing, napping','emotion effects (e.g. gardening: anger -0.03, joy +0.03)','item yields (fishing 40%, foraging 60%, cooking 70%)','waypoint-specific availability','5-minute cooldown before repeating','soliloquy trigger: reflective waypoint + solo activity']},
        {title:'Interactions (22 types)',items:['offer_food, give_herb, give_trinket, share_sketch, offer_fish (item-based)','comfort, encourage, compliment, apologize (supportive)','taunt, cold_shoulder, challenge, show_off (antagonistic)','confide, share_story, reminisce, vent (personal)','joke, tease, debate, people_watch, ask_favor (social)','item-based interactions get +2 scoring boost']},
        {title:'Passive Systems',items:['eavesdropping (range 6 tiles, 3-min cooldown per pair)','item decay by category timer','drives: gift-seeking (30%), loneliness (90s+, 15%), restlessness (10% at anger/fear >0.6)']},
        {title:'Write-Back to NPC State',items:['activities create memories + shift emotions','interactions change relationships + create memories','eavesdropping creates gossip memories','drives set behavioral overrides']}
      ]
    }},
  {id:'daycycle', label:'Day Cycle', color:'var(--accent-day)', glow:'glow-day',
    angle:280, span:80, radius:290,
    detail:{
      tag:'LOOP \u00b7 ~2 min/phase', title:'Day Cycle',
      desc:'Time advances through morning \u2192 afternoon \u2192 evening phases. The day cycle resolves promises (calling LLM directly with its own narrator prompt), decays emotions toward baselines, and creates the temporal rhythm of the simulation.',

// Build a map: nodeId → Set of directly connected nodeIds
const adjacency = {};
CONNECTIONS.forEach(conn => {
  if(!adjacency[conn.from]) adjacency[conn.from] = new Set();
  if(!adjacency[conn.to]) adjacency[conn.to] = new Set();
  adjacency[conn.from].add(conn.to);
  adjacency[conn.to].add(conn.from);
});

// Get all nodes reachable within `depth` hops
function getConnectedIds(startId, depth=2){
  const visited = new Set([startId]);
  let frontier = [startId];
  for(let d=0; d<depth; d++){
    const next = [];
    for(const id of frontier){
      for(const neighbor of (adjacency[id] || [])){
        if(!visited.has(neighbor)){ visited.add(neighbor); next.push(neighbor); }
      }
    }
    frontier = next;
  }
  return visited;
}

let hoveredNodeId = null;

function highlightNode(nodeId){
  if(hoveredNodeId === nodeId) return;
  hoveredNodeId = nodeId;

  // Show only direct connections, hide everything else
  connectionEls.forEach(c => {
    const touchesHovered = c.fromId === nodeId || c.toId === nodeId;
    if(touchesHovered){
      c.line.setAttribute('opacity', '.55');
      c.line.setAttribute('stroke-width', '2');
    } else {
      c.line.setAttribute('opacity', '0');
      c.line.setAttribute('stroke-width', '1.5');
    }
  });

  // Activate animated arrows only on direct connections
  flowParticles.forEach(p => {
    const touchesHovered = p.connData.fromId === nodeId || p.connData.toId === nodeId;
    p.active = touchesHovered;
  });
}

function unhighlightAll(){
  hoveredNodeId = null;
  connectionEls.forEach(c => {
    c.line.setAttribute('opacity', '0');
    c.line.setAttribute('stroke-width', '1.5');
  });
  flowParticles.forEach(p => { p.active = false; });
}

  const t = el('text',{x:pos.x,y:pos.y,'text-anchor':'middle',
    'font-size':'8','font-family':'JetBrains Mono, monospace',
    fill:'var(--text-dim)','letter-spacing':'3',opacity});
  t.textContent = label;
  layerLabels.appendChild(t);
});

// ─── Animated arrows (only shown on hover) ─────
const flowParticles = [];
function createFlowArrow(conn){
  const g = el('g',{opacity:'0'});
  const arrow = el('polygon',{points:'-5,-3.5 5,0 -5,3.5', fill:conn.color});
  g.appendChild(arrow);
  layerParticles.appendChild(g);
  const dx = conn.to.x - conn.from.x;
  const dy = conn.to.y - conn.from.y;
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  return {el:g, conn, connData:conn, t:Math.random(), speed:.0015 + Math.random()*.001, active:false, angle};
}
connectionEls.forEach(conn => {
  flowParticles.push(createFlowArrow(conn));
});

// ─── Animation loop ────────────────────────────
function animate(){
  globalTime += 0.016;

  // Animate arc dashes
  for(const [id, data] of Object.entries(midNodeEls)){
    if(data.dash){
      const offset = -globalTime * 30;
      data.dash.setAttribute('stroke-dashoffset', offset);
    }
  }

  // Pulse inner nodes
  for(const [id, data] of Object.entries(innerNodeEls)){
    const pulse = .3 + Math.sin(globalTime * 1.5 + INNER_NODES.findIndex(n=>n.id===id) * .8) * .15;
    data.glow.setAttribute('opacity', pulse);
  }

  // Animated flow arrows (only when hovered)
  flowParticles.forEach(p => {
    if(!p.active){
      p.el.setAttribute('opacity', '0');
      return;
    }
    p.t += p.speed;
    if(p.t > 1) p.t -= 1;
    const x = p.conn.from.x + (p.conn.to.x - p.conn.from.x) * p.t;
    const y = p.conn.from.y + (p.conn.to.y - p.conn.from.y) * p.t;
    p.el.setAttribute('transform', `translate(${x},${y}) rotate(${p.angle})`);
    const edgeFade = Math.sin(p.t * Math.PI);
    p.el.setAttribute('opacity', edgeFade * .6);
  });

  requestAnimationFrame(animate);
}
animate();

// ─── Detail panel ──────────────────────────────
function openPanel(detail, accentColor){
  const panel = document.getElementById('detail-panel');
  const header = document.getElementById('detail-header');
  const body = document.getElementById('detail-body');

  header.innerHTML = `
    <div class="tag" style="color:${accentColor}">${detail.tag}</div>
    <h2>${detail.title}</h2>
  `;

  let html = `<p>${detail.desc}</p>`;

  if(detail.items){
    html += `<ul class="detail-list">${detail.items.map(i=>`<li style="border-left-color:${accentColor}">${i}</li>`).join('')}</ul>`;
  }

  if(detail.sections){
    detail.sections.forEach(s => {
      html += `<h3 style="color:${accentColor}">${s.title}</h3>`;
      html += `<ul class="detail-list">${s.items.map(i=>`<li style="border-left-color:${accentColor}">${i}</li>`).join('')}</ul>`;
    });
  }

  body.innerHTML = html;
  panel.classList.add('open');
}

function closePanel(){
  document.getElementById('detail-panel').classList.remove('open');
}

// ─── Connections panel (left) ──────────────────
// Node name lookup
const nodeNames = {};
INNER_NODES.forEach(n => nodeNames[n.id] = n.label);
MID_NODES.forEach(n => nodeNames[n.id] = n.label);
OUTER_NODES.forEach(n => nodeNames[n.id] = n.label);
nodeNames['prompt'] = 'Prompt Builder';

function openConnectionsPanel(nodeId, accentColor){
  const panel = document.getElementById('connections-panel');
  const header = document.getElementById('conn-header');
  const body = document.getElementById('conn-body');
  const nodeName = nodeNames[nodeId] || nodeId;

  // Find all connections involving this node
  const outbound = CONNECTIONS.filter(c => c.fromId === nodeId || c.from === nodeId);
  const inbound = CONNECTIONS.filter(c => c.toId === nodeId || c.to === nodeId);

  header.innerHTML = `
    <div class="tag" style="color:${accentColor}">CONNECTIONS</div>
    <h2>${nodeName}</h2>
  `;

  let html = '';

  if(outbound.length > 0){
    html += `<div class="conn-section-title" style="color:${accentColor}"><span class="conn-arrow">\u2192</span> Sends data to</div>`;
    outbound.forEach(c => {
      const targetName = nodeNames[c.to] || c.to;
      html += `
        <div class="conn-item" style="border-left-color:${c.color}">
          <div class="conn-item-header">
            <span class="conn-item-node" style="color:${c.color}">${targetName}</span>
            <span class="conn-item-label">${c.label}</span>
          </div>
          <div class="conn-item-desc">${c.desc || ''}</div>
        </div>`;
    });
  }

  if(inbound.length > 0){
    html += `<div class="conn-section-title" style="color:${accentColor}"><span class="conn-arrow">\u2190</span> Receives data from</div>`;
    inbound.forEach(c => {
      const sourceName = nodeNames[c.from] || c.from;
      html += `
        <div class="conn-item" style="border-left-color:${c.color}">
          <div class="conn-item-header">
            <span class="conn-item-node" style="color:${c.color}">${sourceName}</span>
            <span class="conn-item-label">${c.label}</span>
          </div>
          <div class="conn-item-desc">${c.desc || ''}</div>
        </div>`;
    });
  }

  if(outbound.length === 0 && inbound.length === 0){
    html = '<p style="color:var(--text-dim);font-size:13px;">No direct connections.</p>';
  }

  body.innerHTML = html;
  panel.classList.add('open');
}

function closeConnectionsPanel(){
  document.getElementById('connections-panel').classList.remove('open');
}

// Close panels on click outside
document.addEventListener('click', (e)=>{
  const detailPanel = document.getElementById('detail-panel');
  const connPanel = document.getElementById('connections-panel');
  const isOnNode = e.target.closest('.inner-node,.mid-node,.outer-node,.prompt-node');
  if(detailPanel.classList.contains('open') && !detailPanel.contains(e.target) && !isOnNode) closePanel();
  if(connPanel.classList.contains('open') && !connPanel.contains(e.target) && !isOnNode) closeConnectionsPanel();
});

// Close on Escape
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape'){ closePanel(); closeConnectionsPanel(); }
});

// ─── Tooltip ───────────────────────────────────
const tooltipEl = document.getElementById('tooltip');
function showTooltip(e, text){
  tooltipEl.textContent = text;
  tooltipEl.classList.add('visible');
  positionTooltip(e);
}
function hideTooltip(){
  tooltipEl.classList.remove('visible');
}
document.addEventListener('mousemove', (e)=>{
  if(tooltipEl.classList.contains('visible')) positionTooltip(e);
});
function positionTooltip(e){
  tooltipEl.style.left = (e.clientX + 12) + 'px';
  tooltipEl.style.top = (e.clientY - 8) + 'px';
}
</script>
</body>
